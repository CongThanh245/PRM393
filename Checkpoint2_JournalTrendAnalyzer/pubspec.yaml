name: journal_trend_analyzer
description: A Flutter app for analyzing academic publication trends with OpenAlex.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^0.68.0
  flutter_dotenv: ^5.2.1
  google_fonts: ^6.2.1
  http: ^1.2.0
  intl: ^0.19.0
  provider: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
